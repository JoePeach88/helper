name: Create helper Release

on:
  push:
    tags:
      - '*.*'
      - '*.*-dev*'

jobs:
  build:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: "[Step 1] Checkout code"
        uses: actions/checkout@v2
  
      - name: "[Step 2] Set up Python"
        uses: actions/setup-python@v3
        with:
          python-version: '3.11'

      - name: "[Step 3] Install Dependencies"
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        continue-on-error: true

      - name: "[Step 4] Execute Python Script"
        id: build
        run: |
          RELEASE_NAME=$(python ./build.py | tail -n 1)
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"

      - name: "[Step 5] Check Release Type"
        id: check_type
        run: |
          if [[ "${{ github.ref_name }}" == *"-dev"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: "[Step 6] Create Release"
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: helper v.${{ steps.build.outputs.release_name }} ${{ steps.check_type.outputs.is_prerelease == 'true' && '(dev)' || '(stable)' }}
          body_path: ./CHANGELOG.md
          draft: false
          prerelease: ${{ steps.check_type.outputs.is_prerelease == 'true' }}

      - name: "[Step 7] Upload Win Installer"
        id: upload-win-installer
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./setup.ps1
          asset_name: setup.ps1
          asset_content_type: application/octet-stream

      - name: "[Step 8] Upload Unix Installer"
        id: upload-unix-installer
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./setup.sh
          asset_name: setup.sh
          asset_content_type: application/octet-stream
