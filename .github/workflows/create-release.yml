name: Create helper Release

on:
  push:
    tags:
      - '*.*'

jobs:
  build:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: "[Step 1] Checkout code"
        uses: actions/checkout@v2
  
      - name: "[Step 2] Set up Python"
        uses: actions/setup-python@v3
        with:
          python-version: '3.11'

      - name: "[Step 3] Install Dependencies"
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        continue-on-error: true

      - name: "[Step 4] Execute Python Script"
        run: python build.py
  
      - name: "[Step 5] Create Release"
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: helper v.${{ github.ref }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false

      - name: "[Step 6] Upload Win Installer"
        id: upload-release-asset 
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./setup.ps1
          asset_name: setup.ps1

      - name: "[Step 7] Upload Unix Installer"
        id: upload-release-asset 
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./setup.sh
          asset_name: setup.sh
